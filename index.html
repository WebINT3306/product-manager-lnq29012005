<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
        }
        h2 {
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        .form-group input {
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            margin-right: 10px;
        }
        #btn-add {
            padding: 8px 15px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        #btn-add:hover {
            background: #555;
        }
        #product-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        #product-table thead {
            background: #ddd;
        }
        #product-table th {
            padding: 10px;
            text-align: left;
            border: 1px solid #999;
            cursor: pointer;
            font-weight: bold;
        }
        #product-table td {
            padding: 10px;
            border: 1px solid #ccc;
        }
        #product-table tbody tr:nth-child(odd) {
            background: #f9f9f9;
        }
        #product-table tbody tr:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Danh sách sản phẩm</h2>

        <table id="product-table">
            <thead>
                <tr>
                    <th>STT</th>
                    <th id="name-header">Tên sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <h2>Thêm sản phẩm</h2>

        <div class="form-group">
            <input id="input-name" placeholder="Tên sản phẩm">
            <input id="input-category" placeholder="Danh mục">
            <input id="input-price" type="number" placeholder="Đơn giá">
            <input id="input-quantity" type="number" placeholder="Số lượng">
            <button id="btn-add">Thêm</button>
        </div>
    </div>

    <script>
        window.products = [];
        window.isAscending = true;

        const tbody = document.querySelector("#product-table tbody");
        const nameHeader = document.getElementById("name-header");

        window.renderTable = function(data) {
            tbody.innerHTML = "";
            data.forEach((p, index) => {
                const row = '<tr><td>' + (index + 1) + '</td><td>' + p.name + '</td><td>' + (p.category || "") + '</td><td>' + p.price + '</td><td>' + p.quantity + '</td></tr>';
                tbody.innerHTML += row;
            });
        };

        window.loadProducts = function() {
            const xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    window.products = JSON.parse(xhr.responseText);
                    window.renderTable(window.products);
                }
            };
            xhr.open('GET', 'products.json');
            xhr.send();
        };

        window.sortProducts = function() {
            window.products.sort(function(a, b) {
                if (a.name.toLowerCase() < b.name.toLowerCase()) return window.isAscending ? -1 : 1;
                if (a.name.toLowerCase() > b.name.toLowerCase()) return window.isAscending ? 1 : -1;
                return 0;
            });

            window.isAscending = !window.isAscending;
            nameHeader.innerText = "Tên sản phẩm " + (window.isAscending ? "▲" : "▼");

            window.renderTable(window.products);
        };

        window.addProduct = function() {
            const name = document.getElementById("input-name").value.trim();
            const category = document.getElementById("input-category").value.trim();
            const price = Number(document.getElementById("input-price").value);
            const quantity = Number(document.getElementById("input-quantity").value);

            if (name.length < 3) {
                alert("Tên sản phẩm phải >= 3 ký tự");
                return;
            }
            if (price <= 0) {
                alert("Đơn giá phải > 0");
                return;
            }
            if (!Number.isInteger(quantity) || quantity < 1) {
                alert("Số lượng phải >= 1");
                return;
            }

            const newProduct = {
                id: window.products.length + 1,
                name: name,
                category: category,
                price: price,
                quantity: quantity
            };

            window.products.push(newProduct);
            window.renderTable(window.products);

            document.getElementById("input-name").value = "";
            document.getElementById("input-category").value = "";
            document.getElementById("input-price").value = "";
            document.getElementById("input-quantity").value = "";
        };

        nameHeader.addEventListener("click", window.sortProducts);
        document.getElementById("btn-add").addEventListener("click", window.addProduct);

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', window.loadProducts);
        } else {
            window.loadProducts();
        }
    </script>

</body>
</html>
